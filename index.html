<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeMentor — Stop Memorizing. Start Thinking Like an Interviewer.</title>
  <meta name="description" content="An expert algorithmic agent that maps complex coding prompts onto structural patterns, generating O(n) optimized solutions with dry runs.">
  <link rel="stylesheet" href="./style.css">
  <!-- Flicker-free theme init: apply stored theme before CSS paint -->
  <script>
    (function() {
      try {
        var t = localStorage.getItem('codementor_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch(e) {}
    })();
  </script>
</head>
<body>

  <!-- CUSTOM VELOCITY CURSOR -->
  <div class="custom-cursor" id="custom-cursor"></div>
  <div class="custom-cursor-follower" id="custom-cursor-follower"></div>

  <!-- NOISE TEXTURE & GLOW SYSTEM -->
  <div class="noise-overlay"></div>
  <div class="glow-bg">
    <div class="glow-orb orb-purple"></div>
    <div class="glow-orb orb-cyan"></div>
    <div class="glow-orb orb-green"></div>
  </div>
  <div class="grid-overlay"></div>

  <div id="app-root"></div>

  <!-- JS Dependencies & Main Logic -->
  <script type="module" src="./src/main.js"></script>

  <!-- AUTH MODAL OVERLAY -->
  <div class="auth-overlay" id="auth-modal">
    <div class="auth-card">
      <button class="auth-close" id="btn-auth-close" aria-label="Close modal">&times;</button>
      
      <div class="auth-slider-window">
        <div class="auth-panels-slider" id="auth-panels-slider">
          
          <!-- PANEL 1: SIGN IN -->
          <div class="auth-panel" id="panel-signin">
            <h3 class="auth-title">Welcome Back</h3>
            <p class="auth-subtitle">Continue your coding mastery journey</p>
            
            <!-- OAuth Actions -->
            <div class="auth-oauth-group">
              <button class="btn-oauth" id="btn-oauth-google-in">
                <svg width="18" height="18" viewBox="0 0 24 24">
                  <path fill="#4285F4" d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v3.9h6.69c-.29 1.5-.1.14-.14 3.08l3.1 2.4c1.8-1.66 2.9-4.1 2.9-7.3z"/>
                  <path fill="#34A853" d="M12 24c3.24 0 5.97-1.08 7.96-2.91l-3.1-2.4c-.87.58-1.97.92-3.11.92-3.11 0-5.74-2.1-6.68-4.92H3.79v2.48C5.76 21.05 8.64 24 12 24z"/>
                  <path fill="#FBBC05" d="M5.32 14.69c-.24-.7-.38-1.44-.38-2.2c0-.76.14-1.51.38-2.2V7.81H3.79C2.98 9.42 2.5 11.24 2.5 13c0 1.76.48 3.58 1.29 5.19l3.78-2.92-1.25-.58z"/>
                  <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.4-3.4C17.96 1.19 15.24 0 12 0 8.64 0 5.76 2.95 3.79 5.19l3.78 2.93c.94-2.82 3.57-4.92 6.68-4.92z"/>
                </svg>
                Google
              </button>
              <button class="btn-oauth" id="btn-oauth-github-in">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                  <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.137 20.164 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
                </svg>
                GitHub
              </button>
            </div>
            
            <div class="auth-divider"><span>or sign in with email</span></div>
            
            <form class="auth-form" id="form-signin" novalidate>
              <div class="form-group">
                <input type="email" id="signin-email" required placeholder=" ">
                <label for="signin-email">Email Address</label>
                <span class="error-msg" id="err-signin-email"></span>
              </div>
              <div class="form-group">
                <input type="password" id="signin-password" required placeholder=" ">
                <label for="signin-password">Password</label>
                <span class="error-msg" id="err-signin-password"></span>
              </div>
              <button type="submit" class="btn-auth-submit" id="btn-signin-submit">
                <span class="btn-text">Sign In</span>
                <span class="btn-spinner"></span>
              </button>
            </form>
            
            <div class="auth-switch">
              Don't have an account? <a href="#" id="link-go-signup">Sign up</a>
            </div>
          </div>
          
          <!-- PANEL 2: SIGN UP / REGISTER -->
          <div class="auth-panel" id="panel-signup">
            <h3 class="auth-title">Create Account</h3>
            <p class="auth-subtitle">Start thinking like an interviewer today</p>
            
            <div class="auth-oauth-group">
              <button class="btn-oauth" id="btn-oauth-google-up">
                <svg width="18" height="18" viewBox="0 0 24 24">
                  <path fill="#4285F4" d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v3.9h6.69c-.29 1.5-.1.14-.14 3.08l3.1 2.4c1.8-1.66 2.9-4.1 2.9-7.3z"/>
                  <path fill="#34A853" d="M12 24c3.24 0 5.97-1.08 7.96-2.91l-3.1-2.4c-.87.58-1.97.92-3.11.92-3.11 0-5.74-2.1-6.68-4.92H3.79v2.48C5.76 21.05 8.64 24 12 24z"/>
                  <path fill="#FBBC05" d="M5.32 14.69c-.24-.7-.38-1.44-.38-2.2c0-.76.14-1.51.38-2.2V7.81H3.79C2.98 9.42 2.5 11.24 2.5 13c0 1.76.48 3.58 1.29 5.19l3.78-2.92-1.25-.58z"/>
                  <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.4-3.4C17.96 1.19 15.24 0 12 0 8.64 0 5.76 2.95 3.79 5.19l3.78 2.93c.94-2.82 3.57-4.92 6.68-4.92z"/>
                </svg>
                Google
              </button>
              <button class="btn-oauth" id="btn-oauth-github-up">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                  <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.137 20.164 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
                </svg>
                GitHub
              </button>
            </div>
            
            <div class="auth-divider"><span>or sign up with email</span></div>
            
            <form class="auth-form" id="form-signup" novalidate>
              <div class="form-group">
                <input type="text" id="signup-name" required placeholder=" ">
                <label for="signup-name">Full Name</label>
                <span class="error-msg" id="err-signup-name"></span>
              </div>
              <div class="form-group">
                <input type="email" id="signup-email" required placeholder=" ">
                <label for="signup-email">Email Address</label>
                <span class="error-msg" id="err-signup-email"></span>
              </div>
              <div class="form-group">
                <input type="password" id="signup-password" required placeholder=" ">
                <label for="signup-password">Password</label>
                <span class="error-msg" id="err-signup-password"></span>
              </div>
              <div class="form-group">
                <input type="password" id="signup-confirm-password" required placeholder=" ">
                <label for="signup-confirm-password">Confirm Password</label>
                <span class="error-msg" id="err-signup-confirm-password"></span>
              </div>
              <button type="submit" class="btn-auth-submit" id="btn-signup-submit">
                <span class="btn-text">Create Account</span>
                <span class="btn-spinner"></span>
              </button>
            </form>
            
            <div class="auth-switch">
              Already have an account? <a href="#" id="link-go-signin">Sign in</a>
            </div>
          </div>
          
        </div>
      </div>
    </div>
  </div>

</body>
</html>
